<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' https://api.fontshare.com https://cdn.fontshare.com https://fonts.googleapis.com https://fonts.gstatic.com; connect-src http://127.0.0.1:7842; font-src 'self' data: https://cdn.fontshare.com https://fonts.gstatic.com">
  <title>Second Cerveau</title>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="zen.css">
</head>
<body>

  <div class="stage">
    <!-- Aurora blobs (animés par CSS) -->
    <div class="aurora"><b class="b1"></b><b class="b2"></b><b class="b3"></b></div>

    <!-- Panneau principal -->
    <div class="panel" id="panel">

      <!-- Top bar -->
      <div class="topbar" id="topbar">
        <div class="brand">
          <span class="logo" id="logo-slot"></span>
          <span class="wordmark">Second Cerveau</span>
        </div>
        <span class="spacer"></span>
        <div class="modeswitch">
          <button id="btn-grille"></button>
          <button id="btn-constellation"></button>
          <button id="btn-zen"></button>
          <button id="btn-calendar" class="tab-btn" data-tab="calendar">📅 Calendrier</button>
        </div>
        <button id="btn-refresh" title="Rafraîchir" aria-label="Rafraîchir les notes"></button>
        <span class="pill-stat" id="pill-stat"><span class="dot"></span></span>
      </div>

      <!-- Vue Grille -->
      <div id="grille-view" class="scroll">

        <div class="chat" id="chat-bar">
          <div class="field">
            <span id="spark-icon"></span>
            <input type="text" id="chat-input" placeholder="Pose une question à tes notes…" autocomplete="off">
            <span class="kbd">↵</span>
          </div>
          <div id="chat-response" class="chat-response hidden"></div>
        </div>

        <div class="filters" id="filter-bar"></div>

        <div id="sections-container"></div>

      </div><!-- /grille-view -->

      <!-- Vue Constellation (cachée par défaut) -->
      <div id="constel-view" class="hidden"></div>

      <!-- Onglet Zen -->
      <div id="zen-view" class="hidden"></div>

      <!-- Vue Calendrier (cachée par défaut) -->
      <div id="calendar-view" class="view hidden">
        <div class="cal-wrapper">
          <!-- Colonne gauche : mini-grille -->
          <div class="cal-left">
            <button id="cal-add-btn" class="cal-add-btn">+ Ajouter un événement</button>
            <div class="cal-month-nav">
              <button id="cal-prev">◀</button>
              <span id="cal-month-label"></span>
              <button id="cal-next">▶</button>
            </div>
            <div id="cal-mini-grid" class="cal-mini-grid"></div>
          </div>
          <!-- Colonne droite : agenda -->
          <div class="cal-right">
            <div class="cal-agenda-header">
              <span class="cal-agenda-title">Prochains événements</span>
              <div class="cal-filters" id="cal-filters">
                <button class="cal-filter active" data-type="all">Tous</button>
                <button class="cal-filter" data-type="rdv">📅 RDV</button>
                <button class="cal-filter" data-type="anniversaire">🎂</button>
                <button class="cal-filter" data-type="tache">✅</button>
                <button class="cal-filter" data-type="deadline">⏰</button>
              </div>
            </div>
            <div id="cal-agenda-list" class="cal-agenda-list"></div>
          </div>
        </div>

        <!-- Modale ajout/édition -->
        <div id="cal-modal-overlay" class="cal-modal-overlay hidden">
          <div class="cal-modal">
            <div class="cal-modal-title" id="cal-modal-title">Nouvel événement</div>
            <input type="hidden" id="cal-event-id">
            <div class="cal-field">
              <label>Titre</label>
              <input type="text" id="cal-f-titre" placeholder="Ex: RDV Médecin, Anniversaire papa…">
            </div>
            <div class="cal-field">
              <label>Type</label>
              <select id="cal-f-type">
                <option value="rdv">📅 RDV</option>
                <option value="anniversaire">🎂 Anniversaire</option>
                <option value="tache">✅ Tâche</option>
                <option value="deadline">⏰ Deadline</option>
              </select>
            </div>
            <div class="cal-field">
              <label>Date &amp; heure</label>
              <input type="datetime-local" id="cal-f-date">
            </div>
            <div class="cal-field">
              <label>Description (optionnel)</label>
              <textarea id="cal-f-desc" placeholder="Notes, adresse, contexte…"></textarea>
            </div>
            <div class="cal-field">
              <label>Rappels</label>
              <div class="cal-reminder-chips" id="cal-reminder-chips">
                <div class="cal-chip" data-type="weeks" data-value="1">S-1</div>
                <div class="cal-chip" data-type="days" data-value="7">J-7</div>
                <div class="cal-chip" data-type="days" data-value="3">J-3</div>
                <div class="cal-chip" data-type="days" data-value="1">J-1</div>
                <div class="cal-chip" data-type="hours" data-value="2">H-2</div>
                <div class="cal-chip" data-type="hours" data-value="1">H-1</div>
                <div class="cal-chip" data-type="days" data-value="0" data-send-time="09:00">J-0 matin</div>
              </div>
            </div>
            <div class="cal-modal-actions">
              <button id="cal-modal-cancel" class="cal-btn-cancel">Annuler</button>
              <button id="cal-modal-save" class="cal-btn-save">Enregistrer</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Status strip (remplace les corner stats) -->
      <div class="statusbar" id="statusbar"></div>

      <!-- Blocs fixes (Travail / Projets / Bloc-notes) -->
      <section id="blocs-section">
        <div class="blocs-resize-handle" id="blocs-resize-handle"></div>
      </section>

    </div><!-- /panel -->
  </div><!-- /stage -->

  <script src="calendar.js"></script>
  <script type="module" src="renderer.js"></script>
</body>
</html>
